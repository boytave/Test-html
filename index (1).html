<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รัน Local HTML (Offline Mode)</title>
    <style>
        /* CSS พื้นฐานเพื่อแทนที่ Tailwind */
        :root {
            --slate-50: #f8fafc;
            --slate-200: #e2e8f0;
            --slate-300: #cbd5e1;
            --slate-400: #94a3b8;
            --slate-500: #64748b;
            --slate-600: #475569;
            --slate-800: #1e293b;
            --slate-900: #0f172a;
            --blue-500: #3b82f6;
            --blue-600: #2563eb;
            --amber-600: #d97706;
            --red-100: #fee2e2;
            --red-200: #fecaca;
            --red-700: #b91c1c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--slate-50);
            color: var(--slate-800);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* --- หน้าจออัปโหลด --- */
        #uploadScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
            transition: all 0.3s ease;
        }

        .upload-container {
            max-width: 42rem;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 1.875rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--slate-900);
        }

        .subtitle {
            color: var(--slate-500);
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .warning-text {
            font-size: 0.875rem;
            color: var(--amber-600);
            font-weight: 500;
            display: block;
            margin-top: 0.5rem;
        }

        /* กล่อง Drag & Drop */
        .drop-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 16rem;
            border: 2px dashed var(--slate-300);
            border-radius: 1rem;
            cursor: pointer;
            background-color: white;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .drop-zone:hover {
            background-color: var(--slate-50);
        }

        .drop-zone.drag-over {
            background-color: #eff6ff;
            border-color: var(--blue-500);
        }

        .drop-zone svg {
            width: 3rem;
            height: 3rem;
            margin-bottom: 1rem;
            color: var(--slate-400);
            transition: color 0.2s;
        }

        .drop-zone:hover svg {
            color: var(--blue-500);
        }

        .drop-zone-text-main {
            margin-bottom: 0.5rem;
            font-size: 1.125rem;
            color: var(--slate-600);
        }

        .drop-zone-text-main span {
            font-weight: 600;
            color: var(--blue-600);
        }

        .drop-zone-text-sub {
            font-size: 0.875rem;
            color: var(--slate-400);
        }

        /* ซ่อน input แบบปกติ */
        #fileInput {
            display: none;
        }

        /* ข้อความ Error */
        #errorMessage {
            display: none; /* เริ่มต้นด้วยการซ่อน */
            margin-top: 1rem;
            background-color: var(--red-100);
            color: var(--red-700);
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            border: 1px solid var(--red-200);
        }

        /* --- Iframe สำหรับแสดงผล --- */
        #previewFrame {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            background-color: white;
            z-index: 40;
        }

        /* --- ปุ่มปิดลอย (Floating Button) --- */
        #closeBtn {
            display: none; /* ซ่อนไว้จนกว่าจะมีไฟล์โหลด */
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 50;
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-weight: 500;
            font-size: 0.875rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transition: all 0.5s ease-in-out;
            
            /* การจัดวางข้างในปุ่ม */
            display: flex;
            align-items: center;
            gap: 0.5rem;

            /* ค่าเริ่มต้นสำหรับการทำ Animation สไลด์ */
            transform: translateY(0);
            opacity: 1;
        }

        #closeBtn:hover {
            background-color: rgba(0, 0, 0, 0.9);
        }

        #closeBtn svg {
            width: 1rem;
            height: 1rem;
        }

        /* Class พิเศษสำหรับควบคุมการแสดงผลผ่าน JS */
        .hidden {
            display: none !important;
        }

        /* Class สำหรับสไลด์ปุ่มซ่อนขึ้นข้างบน */
        .hide-button {
            transform: translateY(-6rem) !important; /* เลื่อนขึ้นไปข้างบน */
            opacity: 0 !important;
            pointer-events: none !important; /* ไม่ให้กดได้ตอนที่มองไม่เห็น */
        }
    </style>
</head>
<body>

    <!-- หน้าจอส่วนอัปโหลดไฟล์ -->
    <div id="uploadScreen">
        <div class="upload-container">
            <h1>ทดสอบรันไฟล์ HTML</h1>
            <p class="subtitle">
                เลือกไฟล์ .html จากเครื่องของคุณเพื่อรันและแสดงผลแบบเต็มหน้าจอ <br>
                <span class="warning-text">* ระบบออฟไลน์: ไม่จำเป็นต้องใช้อินเทอร์เน็ตในการทำงาน</span>
            </p>

            <!-- พื้นที่อัปโหลดไฟล์ -->
            <label id="dropZone" class="drop-zone">
                <div style="display: flex; flex-direction: column; align-items: center;">
                    <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 16">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 13h3a3 3 0 0 0 0-6h-.025A5.56 5.56 0 0 0 16 6.5 5.5 5.5 0 0 0 5.207 5.021C5.137 5.017 5.071 5 5 5a4 4 0 0 0 0 8h2.167M10 15V6m0 0L8 8m2-2 2 2"/>
                    </svg>
                    <p class="drop-zone-text-main"><span>คลิกเพื่อเลือกไฟล์</span> หรือลากไฟล์มาวางที่นี่</p>
                    <p class="drop-zone-text-sub">รองรับไฟล์ .html, .htm</p>
                </div>
                <input id="fileInput" type="file" accept=".html, .htm" />
            </label>

            <!-- ข้อความแจ้งเตือน Error -->
            <div id="errorMessage"></div>
        </div>
    </div>

    <!-- ส่วนที่ใช้แสดงผล HTML แบบเต็มหน้าจอ -->
    <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>

    <!-- ปุ่มลอยสำหรับกดปิด -->
    <!-- หมายเหตุ: ใส่ inline style display: none เพื่อป้องกันปุ่มแว้บขึ้นมาก่อนเริ่มทำงาน -->
    <button id="closeBtn" style="display: none;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        ปิดหน้าเว็บ
    </button>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const fileInput = document.getElementById('fileInput');
            const dropZone = document.getElementById('dropZone');
            const uploadScreen = document.getElementById('uploadScreen');
            const previewFrame = document.getElementById('previewFrame');
            const closeBtn = document.getElementById('closeBtn');
            const errorMessage = document.getElementById('errorMessage');
            
            let currentObjectUrl = null;
            let hideTimeout = null;

            // ฟังก์ชันซ่อนปุ่ม (เพิ่ม class .hide-button ที่เขียนไว้ใน CSS)
            function hideCloseButton() {
                closeBtn.classList.add('hide-button');
            }

            // ฟังก์ชันแสดงปุ่มชั่วคราว (3 วินาที)
            function showCloseButtonTemporarily() {
                if (hideTimeout) clearTimeout(hideTimeout);
                
                // เอา class ซ่อนออก
                closeBtn.classList.remove('hide-button');
                
                hideTimeout = setTimeout(() => {
                    hideCloseButton();
                }, 3000);
            }

            function loadHtmlFile(file) {
                errorMessage.style.display = 'none'; // ซ่อน Error

                if (!file) return;

                const validExts = ['.html', '.htm'];
                const fileExt = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
                
                // ถ้าระบบออฟไลน์ เบราว์เซอร์อาจระบุ file.type แปลกๆ ดังนั้นเช็คแค่นามสกุลก็พอ
                if (!validExts.includes(fileExt)) {
                    showError("รูปแบบไฟล์ไม่ถูกต้อง กรุณาอัปโหลดไฟล์นามสกุล .html");
                    return;
                }

                if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);

                currentObjectUrl = URL.createObjectURL(file);
                previewFrame.src = currentObjectUrl;

                // เปลี่ยน UI 
                uploadScreen.classList.add('hidden');
                
                // ใช้การเปลี่ยน display แบบตรงๆ เพื่อความชัวร์ (ลบล้าง class .hidden หรือสไตล์เก่า)
                previewFrame.style.display = 'block';
                
                // ต้องเปลี่ยนจาก none เป็น flex เพื่อให้ไอคอนกับข้อความจัดเรียงถูกต้อง
                closeBtn.style.display = 'flex'; 
                
                // ล้างสถานะเผื่อซ่อนค้างไว้
                closeBtn.classList.remove('hide-button');
            }

            // เมื่อ iframe โหลดเสร็จ
            previewFrame.addEventListener('load', () => {
                if (previewFrame.src !== 'about:blank' && previewFrame.src !== '' && previewFrame.src !== window.location.href) {
                    showCloseButtonTemporarily();
                }

                try {
                    const iframeWindow = previewFrame.contentWindow;

                    iframeWindow.addEventListener('scroll', () => {
                        let scrollTop = iframeWindow.pageYOffset || iframeWindow.document.documentElement.scrollTop;
                        
                        if (scrollTop <= 5) {
                            showCloseButtonTemporarily();
                        } else {
                            if (hideTimeout) clearTimeout(hideTimeout);
                            hideCloseButton();
                        }
                    }, { passive: true });

                    iframeWindow.addEventListener('mousemove', (e) => {
                        if (e.clientY <= 20) {
                            showCloseButtonTemporarily();
                        }
                    });
                } catch (error) {
                    // ปัญหา Same-origin ปกติเมื่อโหลดผ่าน ObjectURL แบบ Local (บางเบราว์เซอร์เข้มงวด)
                    console.log("Scroll detection may be limited due to browser security settings.");
                }
            });

            closeBtn.addEventListener('mouseenter', () => {
                if (hideTimeout) clearTimeout(hideTimeout);
                closeBtn.classList.remove('hide-button');
            });

            closeBtn.addEventListener('mouseleave', () => {
                showCloseButtonTemporarily();
            });

            function showError(msg) {
                errorMessage.textContent = msg;
                errorMessage.style.display = 'block';
                fileInput.value = '';
            }

            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) loadHtmlFile(e.target.files[0]);
            });

            closeBtn.addEventListener('click', () => {
                if (hideTimeout) clearTimeout(hideTimeout);
                
                previewFrame.src = 'about:blank';
                if (currentObjectUrl) {
                    URL.revokeObjectURL(currentObjectUrl);
                    currentObjectUrl = null;
                }
                fileInput.value = '';

                previewFrame.style.display = 'none';
                closeBtn.style.display = 'none';
                uploadScreen.classList.remove('hidden');
            });

            // Drag & Drop
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, e => { e.preventDefault(); e.stopPropagation(); }, false);
            });
            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => dropZone.classList.add('drag-over'), false);
            });
            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => dropZone.classList.remove('drag-over'), false);
            });
            dropZone.addEventListener('drop', (e) => {
                if (e.dataTransfer.files.length > 0) loadHtmlFile(e.dataTransfer.files[0]);
            }, false);
        });
    </script>
</body>
</html>
